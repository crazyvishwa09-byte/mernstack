     <script>
        // local, session, cookies


        // local
        var userName = "Demo name"

        localStorage.setItem("name",userName)

        var userData = localStorage.getItem("isLogin")
        console.log(userData,"getItem");

        localStorage.removeItem("name")

        localStorage.clear()



        // session storage

        var studentData = {
