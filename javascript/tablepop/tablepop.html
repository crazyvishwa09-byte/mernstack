<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<main class="container mt-4">

    <section class="d-flex justify-content-between align-items-center mb-3">
        <h2>STUDENT'S PROFILE</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Add Student
        </button>
    </section>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>NAME</th>
                <th>REG NO</th>
                <th>DEPT</th>
                <th>COURSE</th>
                <th>CGPA</th>
                <th>EMAIL</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody class="addeddata">
            <!-- Rows inserted here -->
        </tbody>
    </table>

</main>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">STUDENT DETAILS</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="mb-2">
                    <label>NAME:</label>
                    <input type="text" class="form-control" id="recipient-name">
                    <span class="text-danger" id="error-msg-nameId"></span>
                </div>

                <div class="mb-2">
                    <label>REG.NO:</label>
                    <input type="text" class="form-control" id="recipient-regno">
                    <span class="text-danger" id="error-msg-regnoId"></span>
                </div>

                <div class="mb-2">
                    <label>DEPT:</label>
                    <input type="text" class="form-control" id="recipient-dept">
                    <span class="text-danger" id="error-msg-deptId"></span>
                </div>

                <div class="mb-2">
                    <label>COURSE:</label>
                    <input type="text" class="form-control" id="recipient-course">
                    <span class="text-danger" id="error-msg-courseId"></span>
                </div>

                <div class="mb-2">
                    <label>CGPA:</label>
                    <input type="text" class="form-control" id="recipient-cgpa">
                    <span class="text-danger" id="error-msg-cgpaId"></span>
                </div>

                <div class="mb-2">
                    <label>EMAIL:</label>
                    <input type="text" class="form-control" id="recipient-email">
                    <span class="text-danger" id="error-msg-emailId"></span>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-success" onclick="submitdata()">SAVE</button>
            </div>

        </div>
    </div>
</div>

<script>

function displayTableData() {
    let tableBody = document.querySelector(".addeddata");
    let data = JSON.parse(localStorage.getItem("students")) || [];

    tableBody.innerHTML = "";

    data.forEach((student, index) => {
        let row = `
        <tr>
            <td>${student.name}</td>
            <td>${student.regno}</td>
            <td>${student.dept}</td>
            <td>${student.course}</td>
            <td>${student.cgpa}</td>
            <td>${student.email}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteStudent(${index})">
                    Delete
                </button>
            </td>
        </tr>
        `;
        tableBody.innerHTML += row;
    });
}

function submitdata() {

    const nameValue = document.getElementById("recipient-name").value.trim();
    const regnoValue = document.getElementById("recipient-regno").value.trim();
    const deptValue = document.getElementById("recipient-dept").value.trim();
    const courseValue = document.getElementById("recipient-course").value.trim();
    const cgpaValue = document.getElementById("recipient-cgpa").value.trim();
    const emailValue = document.getElementById("recipient-email").value.trim();

    let isValid = true;

    if (nameValue === "") { document.getElementById("error-msg-nameId").innerText = "Enter name"; isValid = false; } else document.getElementById("error-msg-nameId").innerText = "";
    if (regnoValue === "") { document.getElementById("error-msg-regnoId").innerText = "Enter reg no"; isValid = false; } else document.getElementById("error-msg-regnoId").innerText = "";
    if (deptValue === "") { document.getElementById("error-msg-deptId").innerText = "Enter dept"; isValid = false; } else document.getElementById("error-msg-deptId").innerText = "";
    if (courseValue === "") { document.getElementById("error-msg-courseId").innerText = "Enter course"; isValid = false; } else document.getElementById("error-msg-courseId").innerText = "";
    if (cgpaValue === "") { document.getElementById("error-msg-cgpaId").innerText = "Enter cgpa"; isValid = false; } else document.getElementById("error-msg-cgpaId").innerText = "";
    if (emailValue === "") { document.getElementById("error-msg-emailId").innerText = "Enter email"; isValid = false; } else document.getElementById("error-msg-emailId").innerText = "";

    if (!isValid) return;

    const studentData = {
        name: nameValue,
        regno: regnoValue,
        dept: deptValue,
        course: courseValue,
        cgpa: cgpaValue,
        email: emailValue
    };

    let data = JSON.parse(localStorage.getItem("students")) || [];
    data.push(studentData);
    localStorage.setItem("students", JSON.stringify(data));

    displayTableData();

    // Clear inputs
    document.getElementById("recipient-name").value = "";
    document.getElementById("recipient-regno").value = "";
    document.getElementById("recipient-dept").value = "";
    document.getElementById("recipient-course").value = "";
    document.getElementById("recipient-cgpa").value = "";
    document.getElementById("recipient-email").value = "";

    // Close modal
    var modal = bootstrap.Modal.getInstance(document.getElementById('exampleModal'));
    modal.hide();
}

// Delete function
function deleteStudent(index) {
    let data = JSON.parse(localStorage.getItem("students")) || [];
    data.splice(index, 1); // remove 1 item
    localStorage.setItem("students", JSON.stringify(data));
    displayTableData();
}

// Load table on page load
window.onload = function () {
    displayTableData();
};

</script>

</body>
</html>
