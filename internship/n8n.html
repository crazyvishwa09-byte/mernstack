<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0ebf8;
    margin: 0;
    padding: 0;
}
.form-container {
    width: 90%;
    max-width: 600px;
    margin: 40px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h2 {
    margin-bottom: 20px;
    color: #673ab7;
}
.form-group {
    margin-bottom: 20px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}
input, textarea, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
    transition: 0.3s;
}
input:focus, textarea:focus, select:focus {
    border-color: #673ab7;
    outline: none;
    box-shadow: 0 0 5px rgba(103,58,183,0.3);
}
textarea {
    resize: vertical;
    min-height: 100px;
}
button {
    background: #673ab7;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}
button:hover {
    background: #5e35b1;
}
</style>
</head>
<body>
<div class="form-container">
    <h2>Student Registration Form</h2>
    
    <form action="http://localhost:5678/webhook-test/getinfos" method="post">
        
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course" required>
                <option value="">Select Course</option>
                <option value="BCA">BCA</option>
                <option value="BSc CS">BSc Computer Science</option>
                <option value="BTech">BTech</option>
                <option value="MCA">MCA</option>
            </select>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10 digit number" required>
        </div>
        <div class="form-group">
            <label for="email">Mail ID</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Enter your message here..."></textarea>
        </div>
        <button type="submit">Submit</button>

    </form>
</div>
</body>
</html>
