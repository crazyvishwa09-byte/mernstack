<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/042d337638.js" crossorigin="anonymous"></script>
    <title>Icons</title>
</head>
<body>
    <!-- icons -->
    <h1>Icons</h1>
    <p>Camera</p><i class="fa-solid fa-camera"></i> <i class="fa-solid fa-camera" style="font-size: 25px;"></i><i class="fa-solid fa-camera" style="font-size: 50px;"></i>
    <p>Instagram</p><i class="fa-brands fa-square-instagram"></i><i class="fa-brands fa-square-instagram" style="font-size: 25px;"></i><i class="fa-brands fa-square-instagram" style="font-size: 50px;"></i>
    <p>Facebook</p><i class="fa-solid fa-calendar"></i><i class="fa-solid fa-calendar" style="font-size: 25px;"></i><i class="fa-solid fa-calendar" style="font-size: 50px;"></i>
    <p>Headphones</p><i class="fa-regular fa-headphones"></i><i class="fa-regular fa-headphones" style="font-size: 25px;"></i><i class="fa-regular fa-headphones" style="font-size: 50px;"></i>
    <p>Envelope</p><i class="fa-regular fa-envelope"></i>
    <p>music</p><i class="fa-solid fa-music"></i>
    <p>Car</p><i class="fa-solid fa-car"></i>
    <p>Bookmark</p><i class="fa-solid fa-bookmark"></i>
    <p>Wifi</p><i class="fa-solid fa-wifi"></i>
    <p>Snowflake</p><i class="fa-solid fa-snowflake"></i>
    <p>Shirt</p><i class="fa-solid fa-shirt"></i>
   
</body>
</html>
